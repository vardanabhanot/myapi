name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            asset: myapi-windows-amd64.zip
          - os: ubuntu-latest
            target: linux
            asset: myapi-linux-amd64.tar.xz
          - os: macos-latest
            target: darwin
            asset: myapi-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Run tests
        run: go test ./...

      - name: Package
        run: fyne package --os ${{ matrix.target }} --release

      - name: Archive (Windows)
        if: matrix.target == 'windows'
        run: Compress-Archive -Path myAPI.exe -DestinationPath ${{ matrix.asset }}

      - name: Archive (Linux)
        if: matrix.target == 'linux'
        run: mv myAPI.tar.xz ${{ matrix.asset }}

      - name: Archive (macOS)
        if: matrix.target == 'darwin'
        run: zip -r ${{ matrix.asset }} myAPI.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          prerelease: true
          generate_release_notes: true
